<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taco Shop Contact</title>
    <style>
        textarea {
            width: 300px;
            height: 150px;
        }

        div {
            margin-left: 50px;
        }

    </style>
</head>

<body>
    <h1>Contact US</h1>

    <ul>
        <li><a href="./main.html">Home</a></li>
        <li><a href="./main.html#about">About LTS</a></li>
        <li><a href="./main.html#menu">Our Menu</a></li>
        <li><a href="./main.html#store">Store Hours</a></li>
    </ul>

    <div>
    <img src="./public/image3.png" alt=""><br>
    <caption>Tacos And a Drink</caption>
    </div>

    <h1>Our Contact Form</h1>

    <form action="./contact.html" method="post">
        <fieldset>
            <legend>Send Us Message</legend>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter Name">
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter Email">
            <br><br>

            <label for="message">Your Message:</label>
            <br><br>
            <textarea id="message" name="message"></textarea>
            <br><br>

        </fieldset>
        <br>
        <button type="submit">Send</button>
        <button type="reset">Reset</button>
    </form>

    <h1>Our Location</h1>

    <p>555 Taco Temptation Lane, Suite T</p>
    <p>Taco Town, CA 90210</p>
    <p>Phone: <a href="tel">555-555-5555</a></p>

    <a href="#top">Back to Top</a>

    <hr>
    <p> &copy; The Little Taco Shop</p>


</body>

</html>
