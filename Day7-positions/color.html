    <!-- 
    color names
        - rgb (red, green, blue)
        - rgba (red, green, blue, alpha) -- fully transparent to fully opaque (0 to 1)
        - hex (#RRGGBB) -- RR, GG, BB are hexadecimal values for red, green, blue (00 to FF)
        - hsl (hue, saturation, lightness) -- hue is an angle (0 to 360), saturation and lightness are percentages (0% to 100%)
