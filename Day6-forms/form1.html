<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form 1</title>
</head>
<body>
    <form action="" method="get">
        <label for="age">Age: </label>
        <input type="number" name="age" id="age" placeholder="enter age">
        <br><br>
        <label for="name">Name: </label>
        <input type="text" name="name" id="name" placeholder="enter name">
        <br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>

<!-- 
action: where the data is sent

method attribute: specifies how to send form data (the form-data is sent to the page specified in the action attribute)
    1. GET(query string/query parameter): appends the form data to the URL in name/value pairs. 
    2. POST: sends the form data as an HTTP post transaction. Form data is included in the body of the HTTP request when sent to the server. 

name attribute: it is used to specify the data in key value pair format


-->
