<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table, th, td{
            border: 1px solid black;
            border-collapse: collapse;
        }
        table{
            width: 400px;
            height: 40px;
        }
    </style>
</head>
<body>
    <!-- <table border="1" cellpadding="5" cellspacing="0"> -->
    <table>
        <thead>
            <tr>
                <th>SR.NO</th>
                <th>Name</th>
                <th>PHONE.NO</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Abhi</td>
                <td>1234567890</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Aditi</td>
                <td>9876543210</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Bob</td>
                <td>5555555555</td>
            </tr>
        </tbody>
    </table>
</body>
</html>


<!-- 
table tag is used to create a table in HTML. It consists of rows and columns. 
The <table> element defines the table
    <tr> element defines a row
    <th> element defines a header cell
    <td> element defines a standard cell. 
    <thead> for table head
    <tbody> for table body
    
In this example, we have created a simple table with three columns: SR.NO, Name, and PHONE.NO, and three rows of data. The border attribute is used to add a border to the table for better visibility.
-->
