<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: antiquewhite;
        }
        div::first-letter{
            font-size: 40px;
        }
        p{
            background-color: lightblue;
            height: 100px;
            width: 100px;
        }
        p:hover{
            background-color: lightcoral;
            height: 200px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div>
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Tempore suscipit facilis modi voluptatum! Rerum quae beatae, iusto pariatur, voluptatibus magni nesciunt officiis culpa ipsa laboriosam magnam, soluta voluptatem sint sequi.
    </div>
    <p></p>
</body>
</html>

<!-- 
pseudo element: a keyword added to a selector that lets you style a specific part of the selected element(s) denoted by double colons (::)

pseudo class: a keyword added to a selector that specifies a special state of the selected element(s)
ex- :hover, :focus, :active, :visited, :first-child, :last-child, :nth-child(n)
-->
