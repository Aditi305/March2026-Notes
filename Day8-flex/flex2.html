<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 2</title>
    <style>
        .parent{
            border: 1px solid;
            height: 600px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;

        }
        .item{
            width: 100px;
            height: 100px;
            border: 1px solid black;
            font-size: 50px;
        }
        .one{
            background-color: antiquewhite;
        }
        .two{
            background-color: aqua;
        }
        .three{
            background-color: aquamarine;
        }
        .four{
            background-color: rgb(71, 151, 151);
        }
        .five{
            background-color: beige;
        }
        .six{
            background-color: bisque;
        }
        .seven{
            background-color: burlywood;
        }
        .eight{
            background-color: blanchedalmond;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="item one">1</div>
        <div class="item two">2</div>
        <div class="item three">3</div>
        <div class="item four">4</div>
        <div class="item five">5</div>
        <div class="item six">6</div>
        <div class="item seven">7</div>
        <div class="item eight">8</div>
        <div class="item eight">8</div>
        <div class="item eight">8</div>
        <div class="item eight">8</div>
        <div class="item eight">8</div>
    </div>
</body>
</html>

<!-- Justify Content
        space-between: items are distributed with equal space between them
        space-around: items are distributed with equal space around them
        space-evenly: items are distributed with equal space between them and around them
        -->
